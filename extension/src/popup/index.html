<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inSpace</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <!-- Auth screen -->
    <div id="auth-view" class="view" style="display: none">
      <div class="auth-container">
        <div class="logo">inSpace</div>
        <p class="subtitle">Smart bookmarks, everywhere.</p>
        <button id="btn-google-signin" class="btn btn-google btn-full">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>
        <p id="auth-error" class="error"></p>
      </div>
    </div>

    <!-- Save screen -->
    <div id="save-view" class="view" style="display: none">
      <div class="account-bar">
        <div class="account-info">
          <img id="user-avatar" class="avatar" src="" alt="" />
          <span id="user-name" class="account-name"></span>
        </div>
        <button id="btn-signout" class="btn-link">Sign out</button>
      </div>

      <div id="duplicate-banner" class="duplicate-banner" style="display: none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span>Already saved <span id="duplicate-date"></span> — update?</span>
      </div>

      <div id="screenshot-preview" class="screenshot-preview">
        <img id="screenshot-img" src="" alt="" />
      </div>

      <input
        id="input-title"
        type="text"
        placeholder="Page title"
        class="input"
      />

      <div class="url-row">
        <img id="favicon" class="favicon" src="" alt="" />
        <span id="display-url" class="url-text"></span>
      </div>

      <div id="tags-preview" class="tags-preview"></div>

      <input
        id="input-user-tags"
        type="text"
        placeholder="Add tag(s), separated by commas"
        class="input"
      />

      <div class="toggle-row">
        <span class="toggle-label">Capture screenshot</span>
        <label class="toggle">
          <input id="toggle-screenshot" type="checkbox" checked />
          <span class="toggle-track">
            <span class="toggle-knob"></span>
          </span>
        </label>
      </div>

      <button id="btn-save" class="btn btn-primary btn-full">Save</button>
      <div id="save-status" class="status"></div>

      <div class="footer">
        <button id="btn-dashboard-footer" class="btn-link">View Dashboard</button>
      </div>
    </div>

    <!-- Success screen -->
    <div id="success-view" class="view" style="display: none">
      <div class="success-container">
        <div class="success-icon">✓</div>
        <p class="success-text">Saved to inSpace</p>
        <div class="success-actions">
          <button id="btn-open-dashboard" class="btn btn-primary btn-full">
            View Dashboard
          </button>
          <button id="btn-save-another" class="btn btn-secondary btn-full">
            Save another
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
