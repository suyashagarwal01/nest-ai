<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>inSpace</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <!-- Auth screen -->
    <div id="auth-view" class="view" style="display: none">
      <div class="auth-container">
        <div class="logo">inSpace</div>
        <p class="subtitle">Smart bookmarks, everywhere.</p>
        <button id="btn-google-signin" class="btn btn-google btn-full">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.26c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>
        <p id="auth-error" class="error"></p>
      </div>
    </div>

    <!-- Save screen -->
    <div id="save-view" class="view" style="display: none">
      <div class="account-bar">
        <div class="account-info">
          <img id="user-avatar" class="avatar" src="" alt="" />
          <span id="user-name" class="account-name"></span>
        </div>
        <button id="btn-signout" class="btn-link">Sign out</button>
      </div>

      <div id="screenshot-preview" class="screenshot-preview">
        <img id="screenshot-img" src="" alt="" />
      </div>

      <input
        id="input-title"
        type="text"
        placeholder="Page title"
        class="input"
      />

      <div class="url-row">
        <img id="favicon" class="favicon" src="" alt="" />
        <span id="display-url" class="url-text"></span>
      </div>

      <div id="tags-preview" class="tags-preview"></div>

      <textarea
        id="input-note"
        placeholder="Add a note (optional)"
        class="input textarea"
        rows="2"
      ></textarea>

      <div class="toggle-row">
        <label class="toggle-label" for="toggle-screenshot">
          Capture screenshot
        </label>
        <input
          id="toggle-screenshot"
          type="checkbox"
          class="toggle"
          checked
        />
      </div>

      <button id="btn-save" class="btn btn-primary btn-full">Save</button>
      <div id="save-status" class="status"></div>

      <div class="footer">
        <button id="btn-dashboard-footer" class="btn-link">View Dashboard</button>
      </div>
    </div>

    <!-- Success screen -->
    <div id="success-view" class="view" style="display: none">
      <div class="success-container">
        <div class="success-icon">✓</div>
        <p class="success-text">Saved to inSpace</p>
        <button id="btn-open-dashboard" class="btn btn-primary btn-full">
          View Dashboard
        </button>
        <button id="btn-save-another" class="btn btn-secondary btn-full">
          Save another
        </button>
      </div>
    </div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
